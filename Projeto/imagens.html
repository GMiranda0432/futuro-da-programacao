<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Imagens - Futuro da Programação</title>
  <style>
    body {
      background-color: #0f172a;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      padding: 30px;
    }

    h2 {
      color: #38bdf8;
      font-size: 2em;
    }

    img {
      max-width: 90%;
      height: auto;
      margin: 15px;
      border-radius: 12px;
      box-shadow: 0 0 15px #1e3a8a;
    }

    .voltar {
      margin-top: 30px;
    }

    button {
      background-color: #1e40af;
      color: white;
      padding: 12px 25px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <h2>Imagens do Futuro da Programação</h2>

  <img src="media/membro1.png" alt="Membro 1">
  <img src="media/membro2.png" alt="Membro 2">
  <img src="media/membro3.png" alt="Membro 3">
  <img src="media/membro4.png" alt="Membro 4">

  <div class="voltar">
    <button onclick="location.href='index.html'">Voltar para Início</button>
  </div>
</body>
</html>
