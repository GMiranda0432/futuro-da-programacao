<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>O FUTURO DA PROGRAMAÇÃO</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #0f172a;
      color: white;
      text-align: center;
    }

    h1 {
      margin-top: 60px;
      font-size: 3em;
      color: #38bdf8;
      letter-spacing: 2px;
    }

    .container {
      margin-top: 70px;
    }

    button {
      background-color: #1e40af;
      color: white;
      padding: 20px 40px;
      margin: 20px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    button:hover {
      background-color: #2563eb;
    }
  </style>
</head>
<body>
  <h1>O FUTURO DA PROGRAMAÇÃO</h1>

  <div class="container">
    <button onclick="location.href='imagens.html'">Ver Imagens dos Programadores</button>
    <button onclick="location.href='video.html'">Assistir Vídeo</button>
    <button onclick="location.href='destaque.html'">Imagem em Destaque</button>
  </div>
</body>
</html>
